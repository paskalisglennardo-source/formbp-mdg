<script>
/* ============================================================
   BP CREATION FORM — application logic
   ============================================================ */

const STATE = {
  formData: null,
  geoData: null,
  drafts: [],
  currentDraftIdx: 0,
  currentBpType: null,
  currentSection: null,
  settings: {
    workerUrl: '',
    submitEmail: 'bp-creation@wings.co.id',
    ccEmail: '',
    emailApiUrl: '',
    requestor: ''
  }
};

const STORAGE_KEY = 'bp_form_drafts_v2';
const SETTINGS_KEY = 'bp_form_settings_v2';

/* ============================================================
   DOCUMENT REQUIREMENTS PER BP TYPE (source of truth)
   Derived from BP Structure document completion rules.
   Each entry: { key, label, mandatory, bpTypes[] }
   bpTypes: ['*'] = all, or array of specific types e.g. ['ZA01','ZB01']
   ============================================================ */
const DOCUMENT_REQUIREMENTS = [
  // === Core legal documents ===
  { key: 'npwp_attachment',          label: 'NPWP',                               mandatory: true,  bpTypes: ['*'] },
  { key: 'ktp_attachment',           label: 'KTP Pemilik / PIC',                  mandatory: true,  bpTypes: ['*'] },
  { key: 'nib_attachment',           label: 'NIB (Nomor Induk Berusaha)',          mandatory: true,  bpTypes: ['ZA01','ZA02','ZA03','ZA04','ZB01','ZB02','ZC01','ZC02','ZC03','ZC04','ZD01','ZD02','ZE01','ZF01'] },
  { key: 'sppkp_attachment',         label: 'SPPKP',                              mandatory: true,  bpTypes: ['ZA01','ZA02','ZB01','ZB02','ZC01','ZC02','ZD01','ZD02'] },
  { key: 'akta_attachment',          label: 'Akta Pendirian / Perubahan',          mandatory: true,  bpTypes: ['ZA01','ZA02','ZA03','ZB01','ZB02','ZC01','ZC02','ZC03','ZD01','ZD02'] },
  { key: 'siup_attachment',          label: 'SIUP / Izin Usaha',                  mandatory: true,  bpTypes: ['ZA01','ZA02','ZA03','ZB01','ZB02','ZC01','ZC02','ZC03'] },
  { key: 'tdp_attachment',           label: 'TDP / SKT',                          mandatory: false, bpTypes: ['ZA01','ZA02','ZB01','ZB02','ZC01','ZC02'] },

  // === Bank & finance docs ===
  { key: 'rek_koran_attachment',     label: 'Rekening Koran / Bank Statement',    mandatory: true,  bpTypes: ['ZA01','ZA02','ZA03','ZA04','ZB01','ZB02','ZJ01'] },

  // === Identity docs for non-PT entities ===
  { key: 'sim_attachment',           label: 'SIM (jika Driver/Korlap)',            mandatory: false, bpTypes: ['ZA04','ZB02','ZJ01'] },
  { key: 'kk_attachment',            label: 'Kartu Keluarga',                     mandatory: false, bpTypes: ['ZA04','ZB02'] },

  // === Certificates ===
  { key: 'halal_cert_attachment',    label: 'Sertifikat Halal',                   mandatory: false, bpTypes: ['ZA01','ZA02','ZB01','ZC01','ZC02'] },
  { key: 'iso_cert_attachment',      label: 'Sertifikat ISO',                     mandatory: false, bpTypes: ['ZA01','ZA02','ZB01','ZC01'] },
  { key: 'sustain_cert_attachment',  label: 'Sustainability Certificate',         mandatory: false, bpTypes: ['ZA01','ZA02','ZB01'] },
  { key: 'free_tax_cert_attachment', label: 'SKB (Surat Keterangan Bebas Pajak)', mandatory: false, bpTypes: ['ZA01','ZA02','ZA03','ZB01','ZB02'] },

  // === Other ===
  { key: 'faktur_competitor',        label: 'Faktur Competitor / Referensi',       mandatory: false, bpTypes: ['ZC01','ZC02','ZC03','ZC04','ZD01','ZD02','ZE01','ZF01'] },
  { key: 'relation_party_doc_attachment', label: 'Relation Party Document',        mandatory: false, bpTypes: ['ZA01','ZA02','ZB01','ZB02'] },
  { key: 'other_attachment',         label: 'Dokumen Pendukung Lain',             mandatory: false, bpTypes: ['*'] },
];

/* Get document requirements applicable to current BP type */
function getDocRequirements(bpType) {
  return DOCUMENT_REQUIREMENTS.filter(d =>
    d.bpTypes.includes('*') || d.bpTypes.includes(bpType)
  );
}

/* ============================================================
   EMAIL SERVICE ABSTRACTION
   Configurable via environment / settings.
   Currently uses mailto: protocol (no backend needed).
   To switch to an API-based email, implement sendEmailViaAPI().
   ============================================================ */
const EMAIL_CONFIG = {
  // Override via STATE.settings
  get to() { return STATE.settings.submitEmail || 'bp-creation@wings.co.id'; },
  get cc() { return STATE.settings.ccEmail || ''; },
  subjectPrefix: 'BP Creation Request',
  // If a backend email API is available, set this URL
  get apiUrl() { return STATE.settings.emailApiUrl || ''; },
};

async function sendEmail(subject, body, attachmentList) {
  if (EMAIL_CONFIG.apiUrl) {
    // API-based email (future implementation)
    return sendEmailViaAPI(subject, body, attachmentList);
  }
  // Fallback: mailto + separate file downloads
  return sendEmailViaMailto(subject, body, attachmentList);
}

function sendEmailViaMailto(subject, body, attachmentList) {
  // Download all attachments as separate files for manual attach
  attachmentList.forEach(a => {
    const link = document.createElement('a');
    link.href = `data:${a.mime};base64,${a.base64}`;
    link.download = a.downloadName;
    link.click();
  });
  const mailto = `mailto:${encodeURIComponent(EMAIL_CONFIG.to)}?` +
    (EMAIL_CONFIG.cc ? `cc=${encodeURIComponent(EMAIL_CONFIG.cc)}&` : '') +
    `subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

async function sendEmailViaAPI(subject, body, attachmentList) {
  // Placeholder for API-based email integration
  // Expects: POST EMAIL_CONFIG.apiUrl { to, cc, subject, body, attachments: [{filename, mime, base64}] }
  try {
    const res = await fetch(EMAIL_CONFIG.apiUrl, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        to: EMAIL_CONFIG.to,
        cc: EMAIL_CONFIG.cc,
        subject, body,
        attachments: attachmentList.map(a => ({
          filename: a.downloadName, mime: a.mime, base64: a.base64
        }))
      })
    });
    if (!res.ok) throw new Error(`Email API error: ${res.status}`);
    alert('Email berhasil dikirim!');
  } catch (err) {
    alert('Gagal kirim email via API: ' + err.message + '\nFallback ke mailto...');
    sendEmailViaMailto(subject, body, attachmentList);
  }
}

/* ----------- Helpers ----------- */
const $ = (sel, root = document) => root.querySelector(sel);
const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));
const esc = (s) => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

function snakeCase(str) {
  return String(str || '').toLowerCase()
    .replace(/[()[\]{}.,;:!?'"\/\\]/g, '')
    .replace(/&/g, 'and')
    .replace(/\s+/g, '_')
    .replace(/-/g, '_')
    .replace(/_+/g, '_')
    .replace(/^_|_$/g, '');
}

/* Map a sections_schema column label to the canonical field_name used by m_map_field.
   Uses label_to_field map first, falls back to snake_case heuristics. */
function labelToFieldName(label) {
  if (!label) return '';
  const map = STATE.formData?.label_to_field || {};
  if (map[label]) return map[label];
  if (map[label.toLowerCase()]) return map[label.toLowerCase()];
  // overrides
  const overrides = {
    'House Number': 'no',
    'Address (Full)': 'address',
    'Name 1 (Commercial Name)': 'name_1',
    'Name 2 (Legal Name)': 'name_2',
    'Name 3': 'name_3',
    'Name 4': 'name_4',
    'Search Term 1': 'search_term_1',
    'Distr. Channel': 'distribution_channel',
    'Sales Org.': 'sales_org',
    'Recon Account': 'recon_account',
    'Sub District': 'sub_district',
    'Sub-District': 'sub_district',
  };
  if (overrides[label]) return overrides[label];
  return snakeCase(label);
}

/* Centralized field metadata accessor — single source of truth.
   Falls back to a synthesized stub if a field isn't in the metadata table. */
function getFieldMeta(fname) {
  return (STATE.formData?.field_metadata?.[fname]) || {
    widget: 'text', lov: null, lov_filter: null,
    derive_from: null, derive_via: null, compose_from: null,
    export_value: 'self', template_col: null, format_hint: null
  };
}

/* For a column in sections_schema, find its rule entry in field_map for the current BP type */
function fieldRuleFor(bpType, sectionKey, label) {
  const fname = labelToFieldName(label);
  const fm = STATE.formData?.field_map?.[bpType]?.[sectionKey];
  if (!fm) return null;
  return fm[fname] || null;
}

/* ============================================================
   GENERIC DERIVATION ENGINE
   Reads rules from form_data.derivation_engine.rules
   Each rule:
     { id, source_sheet, keys: [...], targets: [...], mode, source? }
   Modes:
     - autofill_single  : exactly 1 match → fill targets, downstream becomes derived
     - autofill_first   : N matches → take [0] → fill targets
     - filter_dropdown  : narrow target dropdown options to match list
   When source === 'geo_data' the engine routes to STATE.geoData (which is too big to inline).
   ============================================================ */

/* Pull the bp_type into a virtual "key" so engine rules can use bp_type as a key field */
function _virtualKeyValue(keyName, sectionData) {
  if (keyName === 'bp_type') return STATE.currentBpType || '';
  if (keyName === 'entity') {
    // BP types ZA*, ZB*, ZJ* → vendor; ZC*, ZD*, ZE*, ZF*, ZG*, ZH*, ZI* → customer
    const bp = STATE.currentBpType || '';
    if (bp.startsWith('ZA') || bp.startsWith('ZB') || bp.startsWith('ZJ')) return 'vendor';
    return 'customer';
  }
  return sectionData[keyName];
}

/* Look up matches for a rule given current section data + general_view fallback */
function _lookupRule(rule, sectionData) {
  const gv = STATE.drafts[STATE.currentDraftIdx]?.sections?.general_view || {};
  const keyVals = rule.keys.map(k => {
    const v = _virtualKeyValue(k, sectionData);
    if (v != null && v !== '') return v;
    // fallback to general_view (e.g. country picked in general_view, used by recon in cust_finance_view)
    return gv[k] || '';
  });
  if (keyVals.some(v => v == null || v === '')) return null; // not enough context

  // Geo cascade rules: route to geo_data instead of engine.lookups
  if (rule.source === 'geo_data') {
    const geo = STATE.geoData?.geo || {};
    const [p, r, d, sd] = keyVals;
    if (rule.id === 'geo_regency_by_province') {
      return Object.keys(geo[p] || {}).sort().map(x => ({regency: x, city: x}));
    }
    if (rule.id === 'geo_district_by_province_regency') {
      return Object.keys(geo[p]?.[r] || {}).sort().map(x => ({district: x}));
    }
    if (rule.id === 'geo_subdistrict_by_province_regency_district') {
      return (geo[p]?.[r]?.[d] || []).map(x => ({sub_district: x[0]}));
    }
    if (rule.id === 'geo_postal_by_full_address') {
      const tuple = (geo[p]?.[r]?.[d] || []).find(x => x[0] === sd);
      if (!tuple) return [];
      return [{
        postal_code: tuple[1],
        region: STATE.geoData?.province_codes?.[p] || ''
      }];
    }
    return [];
  }

  // Regular rule: read from engine.lookups
  const lookupKey = keyVals.join('|');
  let matches = STATE.formData.derivation_engine?.lookups?.[rule.id]?.[lookupKey];
  // Normalize country keys: some lookups use 'ID'/'Non ID' categories instead of ISO codes.
  // If no match and rule uses 'country' as a key, retry with normalized value.
  if (!matches && rule.keys.includes('country')) {
    const ci = rule.keys.indexOf('country');
    const normalized = [...keyVals];
    normalized[ci] = normalized[ci] === 'ID' ? 'ID' : 'Non ID';
    matches = STATE.formData.derivation_engine?.lookups?.[rule.id]?.[normalized.join('|')];
  }
  return matches || [];
}

/* Apply autofill rules triggered by a change to fieldName.
   Returns true if any field value was modified (caller should re-render). */
function applyDerivations(triggerField, sectionData) {
  const engine = STATE.formData?.derivation_engine;
  if (!engine?.rules) return false;
  let mutated = false;

  for (const rule of engine.rules) {
    // Only run rules whose key set includes the trigger (or downstream cascades)
    if (!rule.keys.includes(triggerField)) continue;
    const matches = _lookupRule(rule, sectionData);
    if (!matches || matches.length === 0) continue;

    if (rule.mode === 'autofill_single' && matches.length === 1) {
      for (const t of rule.targets) {
        const v = matches[0][t];
        if (v != null && v !== '' && sectionData[t] !== v) {
          sectionData[t] = v;
          mutated = true;
        }
      }
    } else if (rule.mode === 'autofill_first') {
      for (const t of rule.targets) {
        const v = matches[0][t];
        if (v != null && v !== '' && sectionData[t] !== v) {
          sectionData[t] = v;
          mutated = true;
        }
      }
    } else if (rule.mode === 'filter_dropdown') {
      // Clear stale downstream value if it's not in the new filtered options
      for (const t of rule.targets) {
        const valid = matches.map(m => m[t]).filter(Boolean);
        if (sectionData[t] && !valid.includes(sectionData[t])) {
          sectionData[t] = '';
          mutated = true;
        }
      }
    }
  }
  return mutated;
}

/* Find the LOV (filtered or master) for a field given current section data */
function getLovForField(fname, sectionData) {
  const fd = STATE.formData;
  const engine = fd?.derivation_engine;

  // 1) Engine-driven filter: look for any rule that targets this field with mode=filter_dropdown
  if (engine?.rules) {
    for (const rule of engine.rules) {
      if (rule.mode !== 'filter_dropdown') continue;
      if (!rule.targets.includes(fname)) continue;
      const matches = _lookupRule(rule, sectionData);
      if (matches === null) continue; // not enough context yet
      if (matches.length === 0) return []; // explicit empty (no matches)
      // Build {id, desc} list. Use first target as id, second as desc if present.
      const idField = fname;
      const descField = rule.targets.find(t => t !== fname && t.endsWith('_desc')) || rule.targets[1];
      const seen = new Set();
      const out = [];
      for (const m of matches) {
        const id = m[idField];
        if (!id || seen.has(id)) continue;
        seen.add(id);
        out.push({id, desc: descField ? (m[descField] || '') : ''});
      }
      if (out.length > 0) return out;
    }
  }

  // 2) Static master dropdown via metadata.lov
  const meta = getFieldMeta(fname);
  if (meta.lov && fd.dropdown_lov?.[meta.lov]) {
    return fd.dropdown_lov[meta.lov];
  }
  // 3) Fallback via field_options
  const dropdownKey = fd.field_options?.[fname];
  return dropdownKey ? (fd.dropdown_lov?.[dropdownKey] || []) : null;
}

/* ============================================================
   RUNTIME PATCHES — fixes data-layer gaps without touching form_data.json
   ============================================================ */
function patchFormData(fd) {
  /* PATCH 1: Add missing sections to section_order + section_display.
     5 sections exist in field_map but were omitted from section_order,
     so their tabs never render. */
  const MISSING_SECTIONS = {
    vendor_procurement_view: 'Vendor Procurement View',
    vendor_finance_view:     'Vendor Finance View',
    vendor_withholding_tax:  'Vendor Withholding Tax',
    cust_withholding_tax:    'Customer Withholding Tax',
    partner_function_view:   'Partner Function View',
  };
  // Insert vendor sections right after general_view, customer WHT after cust_finance_view,
  // partner_function at the end (before doc_attachment if present).
  const insertAfter = (arr, anchor, item) => {
    if (arr.includes(item)) return;
    const idx = arr.indexOf(anchor);
    arr.splice(idx >= 0 ? idx + 1 : arr.length, 0, item);
  };
  insertAfter(fd.section_order, 'bank_info',           'vendor_procurement_view');
  insertAfter(fd.section_order, 'vendor_procurement_view', 'vendor_finance_view');
  insertAfter(fd.section_order, 'vendor_finance_view',     'vendor_withholding_tax');
  insertAfter(fd.section_order, 'cust_finance_view',       'cust_withholding_tax');
  insertAfter(fd.section_order, 'salesman_view',           'partner_function_view');
  Object.entries(MISSING_SECTIONS).forEach(([k, v]) => {
    if (!fd.section_display[k]) fd.section_display[k] = v;
  });

  /* PATCH 2: payment_term / payment_terms should be select dropdowns.
     They map to 'Terms of Payment' LOV (178 entries) but metadata
     had widget:'text' and no lov pointer. */
  if (!fd.field_metadata) fd.field_metadata = {};
  ['payment_term', 'payment_terms'].forEach(fn => {
    const m = fd.field_metadata[fn] || {};
    m.widget = 'select';
    m.lov = 'Terms of Payment';
    m.derive_from = ['country'];
    fd.field_metadata[fn] = m;
  });

  /* PATCH 3: top_by_country_entity derivation targets 'top_id' but
     the form fields are payment_term / payment_terms. When the engine
     fills top_id, also copy value to payment_term(s). */
  const engine = fd.derivation_engine;
  if (engine?.rules) {
    const topRule = engine.rules.find(r => r.id === 'top_by_country_entity');
    if (topRule && !topRule._patched) {
      topRule._patched = true;
      // Keep original targets but add payment aliases
      if (!topRule.targets.includes('payment_term'))  topRule.targets.push('payment_term');
      if (!topRule.targets.includes('payment_terms')) topRule.targets.push('payment_terms');
      // Clone lookup entries to also have payment_term/payment_terms keys
      const lk = engine.lookups?.top_by_country_entity;
      if (lk) {
        for (const [key, arr] of Object.entries(lk)) {
          lk[key] = arr.map(row => ({
            ...row,
            payment_term:  row.top_id,
            payment_terms: row.top_id,
          }));
        }
      }
    }
  }

  /* PATCH 4: Generate sections_schema stubs for missing sections
     so Excel export can include them. Schema is inferred from
     field_map labels. */
  if (!fd.sections_schema) fd.sections_schema = {};
  Object.keys(MISSING_SECTIONS).forEach(secKey => {
    if (fd.sections_schema[secKey]) return; // already has schema
    // Collect all unique fields across all BP types for this section
    const allFields = new Map();
    for (const bp of Object.keys(fd.field_map || {})) {
      const secFields = fd.field_map[bp]?.[secKey];
      if (!secFields) continue;
      for (const [fn, meta] of Object.entries(secFields)) {
        if (!allFields.has(fn)) {
          allFields.set(fn, { header: `${meta.label || fn} [${meta.mandatory ? 'M' : 'O'}]`, label: meta.label || fn });
        }
      }
    }
    if (allFields.size > 0) {
      fd.sections_schema[secKey] = Array.from(allFields.entries()).map(([fn, info]) => ({
        header: info.header,
        label: info.label,
        default: null
      }));
    }
  });

  console.log('[patchFormData] Applied 4 runtime patches. section_order:', fd.section_order);
}

/* ============================================================
   BOOT
   ============================================================ */
async function boot() {
  // Load settings
  try {
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    Object.assign(STATE.settings, s);
  } catch {}

  // Load form data
  try {
    const r = await fetch('form_data.json');
    STATE.formData = await r.json();
  } catch (e) {
    alert('Gagal load form_data.json: ' + e.message);
    return;
  }
  patchFormData(STATE.formData);
  // Load geo
  try {
    const r = await fetch('geo_data.json');
    STATE.geoData = await r.json();
  } catch (e) {
    console.warn('geo_data.json tidak ditemukan, dropdown wilayah akan terbatas.');
    STATE.geoData = { province_codes: {}, geo: {} };
  }

  // Populate BP type picker
  const sel = $('#pickBpType');
  Object.entries(STATE.formData.bp_types).forEach(([k, v]) => {
    const o = document.createElement('option');
    o.value = k;
    o.textContent = `${k} — ${v.description}`;
    sel.appendChild(o);
  });

  // Try to load saved drafts
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
    if (saved && saved.drafts && saved.drafts.length) {
      STATE.drafts = saved.drafts;
      STATE.currentBpType = saved.bpType;
      STATE.currentDraftIdx = saved.idx || 0;
      sel.value = STATE.currentBpType;
      enterFormStep();
    }
  } catch {}

  bindUi();
}

function bindUi() {
  $('#pickBpType').addEventListener('change', (e) => {
    $('#btnContinue').disabled = !e.target.value;
    $('#pickerInfo').textContent = e.target.value ? `BP Type ${e.target.value} dipilih.` : '';
  });
  $('#btnContinue').addEventListener('click', () => {
    STATE.currentBpType = $('#pickBpType').value;
    STATE.drafts = [createEmptyDraft()];
    STATE.currentDraftIdx = 0;
    enterFormStep();
  });

  // settings
  $('#btnSettings').addEventListener('click', openSettings);
  $('#btnCancelSettings').addEventListener('click', () => $('#modalSettings').classList.add('hidden'));
  $('#btnSaveSettings').addEventListener('click', saveSettings);

  // drafts
  $('#draftSelector').addEventListener('change', e => { STATE.currentDraftIdx = +e.target.value; renderForm(); });
  $('#btnNewDraft').addEventListener('click', () => { STATE.drafts.push(createEmptyDraft()); STATE.currentDraftIdx = STATE.drafts.length-1; renderDraftSelector(); renderForm(); });
  $('#btnDupDraft').addEventListener('click', () => { STATE.drafts.push(JSON.parse(JSON.stringify(STATE.drafts[STATE.currentDraftIdx]))); STATE.currentDraftIdx = STATE.drafts.length-1; renderDraftSelector(); renderForm(); });
  $('#btnDelDraft').addEventListener('click', () => {
    if (STATE.drafts.length === 1) { alert('Minimal harus ada 1 draft.'); return; }
    if (!confirm('Hapus draft ini?')) return;
    STATE.drafts.splice(STATE.currentDraftIdx, 1);
    STATE.currentDraftIdx = Math.max(0, STATE.currentDraftIdx-1);
    renderDraftSelector(); renderForm();
  });

  // export/import
  $('#btnExportJson').addEventListener('click', exportDraftsJson);
  $('#btnImport').addEventListener('click', () => $('#hiddenImport').click());
  $('#hiddenImport').addEventListener('change', importDraftsJson);

  // submit / download / validate
  $('#btnDownloadXlsx').addEventListener('click', downloadFilledTemplate);
  $('#btnSubmitEmail').addEventListener('click', submitViaEmail);
  $('#btnValidateAi').addEventListener('click', validateWithYeni);

  // Yeni bot
  $('#btnYeniOpen').addEventListener('click', openYeni);
  $('#btnYeniClose').addEventListener('click', () => { $('#yeniPanel').classList.add('hidden'); $('#yeniLauncher').classList.remove('hidden'); });
  $('#yeniForm').addEventListener('submit', e => { e.preventDefault(); sendYeniMessage(); });

  // Hide initial Yeni bubble after 8s
  setTimeout(() => { const b = $('#yeniBubble'); if (b) b.classList.add('opacity-0','transition','duration-500'); }, 8000);

  // Prompt suggestion clicks
  document.querySelectorAll('.yeni-suggest').forEach(btn => {
    btn.addEventListener('click', () => {
      $('#yeniInput').value = btn.textContent;
      openYeni();
      sendYeniMessage();
      // Hide suggestions after first use
      const sg = $('#yeniSuggestions');
      if (sg) sg.classList.add('hidden');
    });
  });
}

function openSettings() {
  $('#setWorkerUrl').value = STATE.settings.workerUrl;
  $('#setSubmitEmail').value = STATE.settings.submitEmail;
  $('#setCcEmail').value = STATE.settings.ccEmail || '';
  $('#setEmailApiUrl').value = STATE.settings.emailApiUrl || '';
  $('#setRequestor').value = STATE.settings.requestor;
  $('#modalSettings').classList.remove('hidden');
}
function saveSettings() {
  STATE.settings.workerUrl = $('#setWorkerUrl').value.trim();
  STATE.settings.submitEmail = $('#setSubmitEmail').value.trim();
  STATE.settings.ccEmail = $('#setCcEmail').value.trim();
  STATE.settings.emailApiUrl = $('#setEmailApiUrl').value.trim();
  STATE.settings.requestor = $('#setRequestor').value.trim();
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(STATE.settings));
  $('#modalSettings').classList.add('hidden');
}

/* ============================================================
   DRAFTS
   ============================================================ */
function createEmptyDraft() {
  const d = { _label: 'Draft baru', sections: {}, attachments: [] };
  // Pre-fill stepper defaults into general_view
  const sd = STATE.formData.stepper_defaults || {};
  d.sections.general_view = {
    prefix_address: sd.prefixAddress || 'JL',
    language_key: sd.languageKey || 'EN',
    prefix_name: '',
    prefix_rt_rw: 'RT',
  };
  return d;
}

function persistDrafts() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      drafts: STATE.drafts, bpType: STATE.currentBpType, idx: STATE.currentDraftIdx
    }));
  } catch {}
}

function renderDraftSelector() {
  const sel = $('#draftSelector');
  sel.innerHTML = '';
  STATE.drafts.forEach((d, i) => {
    const o = document.createElement('option');
    o.value = i;
    const gv = d.sections.general_view || {};
    const name = gv.name_1 || d._label || `Draft ${i+1}`;
    o.textContent = `${i+1}. ${name}`;
    sel.appendChild(o);
  });
  sel.value = STATE.currentDraftIdx;
}

/* ============================================================
   FORM RENDERING
   ============================================================ */
function enterFormStep() {
  $('#step-picker').classList.add('hidden');
  $('#step-form').classList.remove('hidden');
  $('#bpTypeInfo').textContent = `${STATE.currentBpType} — ${STATE.formData.bp_types[STATE.currentBpType]?.description || ''}`;
  STATE.currentSection = STATE.formData.section_order[0];
  renderDraftSelector();
  renderSectionTabs();
  renderForm();
}

function renderSectionTabs() {
  const wrap = $('#sectionTabs');
  wrap.innerHTML = '';
  STATE.formData.section_order.forEach(secKey => {
    // Only render if BP type has any field in this section
    const fm = STATE.formData.field_map?.[STATE.currentBpType]?.[secKey];
    if (!fm || Object.keys(fm).length === 0) return;
    const btn = document.createElement('button');
    btn.className = 'px-4 py-2.5 text-xs font-medium border-r border-slate-200 ' + (secKey === STATE.currentSection ? 'tab-active' : 'tab-inactive');
    btn.textContent = STATE.formData.section_display[secKey] || secKey;
    btn.addEventListener('click', () => { STATE.currentSection = secKey; renderSectionTabs(); renderForm(); });
    wrap.appendChild(btn);
  });
}

function renderForm() {
  if (!STATE.currentSection) STATE.currentSection = STATE.formData.section_order[0];
  renderDraftSelector();
  const area = $('#formArea');
  area.innerHTML = '';
  const draft = STATE.drafts[STATE.currentDraftIdx];
  if (!draft.sections[STATE.currentSection]) draft.sections[STATE.currentSection] = {};
  const sectionData = draft.sections[STATE.currentSection];
  const fieldMap = STATE.formData.field_map?.[STATE.currentBpType]?.[STATE.currentSection] || {};

  // doc_attachment section is empty in field_map per BP type — fall back to standalone uploader
  // (the real document fields incl. their _attachment quartets live in doc_completion and render
  // inline as part of the normal field grid below).
  if (STATE.currentSection === 'doc_attachment' && Object.keys(fieldMap).length === 0) {
    renderAttachmentSection(area, draft);
    return;
  }

  const visibleFields = Object.keys(fieldMap);

  if (visibleFields.length === 0) {
    area.innerHTML = '<p class="text-sm text-slate-500">Tidak ada field untuk section ini pada BP Type terpilih.</p>';
    return;
  }

  // Title
  const h = document.createElement('h3');
  h.className = 'text-lg font-bold mb-4';
  h.textContent = STATE.formData.section_display[STATE.currentSection] || STATE.currentSection;
  area.appendChild(h);

  // Grid
  const grid = document.createElement('div');
  grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-4';
  area.appendChild(grid);

  // Render each field from field_map (the canonical visibility list)
  visibleFields.forEach(fname => {
    const meta = fieldMap[fname];
    grid.appendChild(renderField(fname, meta, sectionData));
  });
  persistDrafts();
}

/* ----- Field renderer — dispatches purely on field_metadata.widget ----- */
function renderField(fname, fmEntry, sectionData) {
  const meta = getFieldMeta(fname);
  const wrap = document.createElement('div');
  const label = document.createElement('label');
  label.className = 'block text-xs font-medium text-slate-700 mb-1';

  const mBadge = fmEntry.mandatory ? '<span class="badge-m">M</span>' : '<span class="badge-o">O</span>';
  const dBadge = (meta.widget === 'derived' || meta.widget === 'composed') ? '<span class="badge-d ml-1">DERIVED</span>' : '';
  label.innerHTML = `${esc(fmEntry.label)} ${mBadge}${dBadge}`;
  wrap.appendChild(label);

  // Resolve LOV with context filter
  const lov = getLovForField(fname, sectionData);

  let input;
  switch (meta.widget) {
    case 'cascade':
      input = renderGeoCascade(fname, sectionData);
      break;
    case 'derived':
      input = renderDerivedReadOnly(fname, sectionData);
      break;
    case 'composed':
      input = renderDerivedAddress(fname, sectionData);
      break;
    case 'select':
      if (lov && lov.length) {
        input = renderDropdown(fname, lov, sectionData);
      } else {
        // Filtered LOV is empty (e.g. user hasn't picked the upstream filter yet)
        input = renderInput(fname, sectionData, 'text');
        input.placeholder = meta.derive_from ? `Pilih ${meta.derive_from.join(' / ')} dulu…` : '';
        input.disabled = !!meta.derive_from;
      }
      break;
    case 'file':
      input = renderFileUpload(fname, fmEntry, sectionData);
      break;
    case 'date':
      input = renderInput(fname, sectionData, 'date'); break;
    case 'email':
      input = renderInput(fname, sectionData, 'email'); break;
    case 'tel':
      input = renderInput(fname, sectionData, 'tel'); break;
    case 'number':
      input = renderInput(fname, sectionData, 'number'); break;
    default:
      // text fallback — also covers name_1 (composed at export, but free-text in UI)
      input = renderInput(fname, sectionData, 'text');
  }
  wrap.appendChild(input);

  // Help text from metadata (no more hardcoded helpTextFor)
  if (meta.format_hint) {
    const p = document.createElement('p');
    p.className = 'text-[10px] text-slate-400 mt-0.5';
    p.textContent = meta.format_hint;
    wrap.appendChild(p);
  }
  return wrap;
}

function renderInput(fname, sectionData, type) {
  const inp = document.createElement('input');
  inp.type = type;
  inp.className = 'w-full border border-slate-300 rounded-md px-3 py-2 text-sm';
  inp.value = sectionData[fname] ?? '';
  inp.dataset.field = fname;
  inp.addEventListener('input', e => {
    sectionData[fname] = e.target.value;
    onFieldChange(fname, e.target.value, sectionData);
  });
  return inp;
}

/* File upload widget for *_attachment fields — stores into the current draft.attachments[] */
function renderFileUpload(fname, meta, sectionData) {
  const draft = STATE.drafts[STATE.currentDraftIdx];
  if (!draft.attachments) draft.attachments = [];
  const existing = draft.attachments.find(a => a.slot === fname);

  const wrap = document.createElement('div');
  wrap.className = 'border border-slate-200 rounded-md p-2 bg-slate-50';

  const fileInp = document.createElement('input');
  fileInp.type = 'file';
  fileInp.accept = 'image/*,.pdf';
  fileInp.className = 'block w-full text-xs';
  fileInp.dataset.field = fname;
  fileInp.addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Maks 5 MB per file.'); fileInp.value=''; return; }
    const b64 = await fileToB64(f);
    draft.attachments = draft.attachments.filter(a => a.slot !== fname);
    draft.attachments.push({
      slot: fname, label: meta.label, filename: f.name, mime: f.type, size: f.size, base64: b64,
      owner: '', note: ''
    });
    sectionData[fname] = f.name; // store filename in section data so it appears in template
    persistDrafts();
    renderForm();
  });
  wrap.appendChild(fileInp);

  if (existing) {
    const status = document.createElement('div');
    status.className = 'mt-2 space-y-1';
    status.innerHTML = `
      <div class="flex items-center justify-between text-[11px]">
        <span class="text-emerald-700 font-medium">✓ ${esc(existing.filename)} (${(existing.size/1024).toFixed(0)} KB)</span>
        <button type="button" data-rm="${fname}" class="text-red-600 underline">remove</button>
      </div>
      <input type="text" placeholder="Pemilik dokumen (nama / posisi)" value="${esc(existing.owner||'')}" class="w-full border border-slate-300 rounded px-2 py-1 text-[11px]" data-owner="${fname}" />
      <input type="text" placeholder="Keterangan (opsional)" value="${esc(existing.note||'')}" class="w-full border border-slate-300 rounded px-2 py-1 text-[11px]" data-note="${fname}" />
    `;
    wrap.appendChild(status);
    status.querySelector('[data-rm]').addEventListener('click', () => {
      draft.attachments = draft.attachments.filter(a => a.slot !== fname);
      sectionData[fname] = '';
      persistDrafts(); renderForm();
    });
    status.querySelector('[data-owner]').addEventListener('input', e => {
      const a = draft.attachments.find(x => x.slot === fname); if (a) { a.owner = e.target.value; persistDrafts(); }
    });
    status.querySelector('[data-note]').addEventListener('input', e => {
      const a = draft.attachments.find(x => x.slot === fname); if (a) { a.note = e.target.value; persistDrafts(); }
    });
  }
  return wrap;
}

function renderDropdown(fname, lov, sectionData) {
  const sel = document.createElement('select');
  sel.className = 'w-full border border-slate-300 rounded-md px-3 py-2 text-sm bg-white';
  sel.dataset.field = fname;
  const empty = document.createElement('option');
  empty.value = ''; empty.textContent = '— pilih —';
  sel.appendChild(empty);
  lov.forEach(it => {
    const id = it.id ?? it;
    const desc = it.desc ?? '';
    const o = document.createElement('option');
    o.value = id;
    o.textContent = desc ? `${id} — ${desc}` : id;
    sel.appendChild(o);
  });
  if (sectionData[fname] != null) sel.value = sectionData[fname];
  sel.addEventListener('change', e => {
    sectionData[fname] = e.target.value;
    onFieldChange(fname, e.target.value, sectionData);
  });
  return sel;
}

function renderDerivedReadOnly(fname, sectionData) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.readOnly = true;
  inp.className = 'w-full border border-slate-300 rounded-md px-3 py-2 text-sm field-derived';
  inp.value = sectionData[fname] ?? '';
  inp.dataset.field = fname;
  inp.placeholder = 'Auto-derived';
  return inp;
}

function renderDerivedAddress(fname, sectionData) {
  const inp = document.createElement('input');
  inp.type = 'text';
  inp.readOnly = true;
  inp.className = 'w-full border border-slate-300 rounded-md px-3 py-2 text-sm field-derived';
  inp.value = composeAddress(sectionData);
  inp.dataset.field = 'address';
  inp.placeholder = 'Otomatis dari prefix + street + blok + no + rt/rw';
  return inp;
}

function composeAddress(sec) {
  const parts = [
    sec.prefix_address || 'JL',
    sec.street,
    sec.blok ? `Blok ${sec.blok}` : '',
    sec.no ? `No. ${sec.no}` : '',
    (sec.rt || sec.rw) ? `RT ${sec.rt || '00'}/RW ${sec.rw || '00'}` : ''
  ].filter(Boolean);
  return parts.join(' ');
}

function composeName(sec) {
  return [sec.prefix_name, sec.name_1].filter(Boolean).join(' ');
}

/* Cascading geo dropdown ----------------- */
function renderGeoCascade(fname, sectionData) {
  const sel = document.createElement('select');
  sel.className = 'w-full border border-slate-300 rounded-md px-3 py-2 text-sm bg-white';
  sel.dataset.field = fname;
  const empty = document.createElement('option');
  empty.value = ''; empty.textContent = '— pilih —';
  sel.appendChild(empty);

  // Use the engine's filtered LOV resolver for downstream levels.
  // For 'province' there's no upstream so we pull keys directly from geo_data.
  let options = [];
  if (fname === 'province') {
    options = Object.keys(STATE.geoData?.geo || {}).sort().map(p => ({id: p, desc: ''}));
  } else {
    options = getLovForField(fname, sectionData) || [];
  }

  options.forEach(opt => {
    const v = typeof opt === 'string' ? opt : opt.id;
    const o = document.createElement('option');
    o.value = v; o.textContent = v;
    sel.appendChild(o);
  });
  if (sectionData[fname]) sel.value = sectionData[fname];

  sel.addEventListener('change', e => {
    sectionData[fname] = e.target.value;
    // Cascade clear lower levels (the engine's filter_dropdown also clears stale values,
    // but we want immediate clearing on parent change so the user sees blank dropdowns)
    if (fname === 'province')                          { sectionData.regency = ''; sectionData.city = ''; sectionData.district = ''; sectionData.sub_district = ''; sectionData.postal_code = ''; sectionData.region = ''; }
    if (fname === 'regency' || fname === 'city')      { sectionData.district = ''; sectionData.sub_district = ''; sectionData.postal_code = ''; }
    if (fname === 'district')                          { sectionData.sub_district = ''; sectionData.postal_code = ''; }

    // Run engine — applies geo_postal_by_full_address (autofill_single) when sub_district picked
    applyDerivations(fname, sectionData);
    renderForm();
  });
  return sel;
}

function onFieldChange(fname, value, sectionData) {
  let needRerender = false;

  // ----- Address auto-join -----
  if (['prefix_address','street','blok','no','rt','rw'].includes(fname)) {
    sectionData.address = composeAddress(sectionData);
    const addrInput = $('input[data-field="address"]');
    if (addrInput) addrInput.value = sectionData.address;
  }

  // ----- Generic derivation engine -----
  // Single call replaces ~80 lines of hardcoded if/else risk_class/sales_org/bank_country/etc.
  if (applyDerivations(fname, sectionData)) {
    needRerender = true;
  }

  // ----- Cascading clears for filter_dropdown chains (handled by generic engine when matches change,
  // but some downstream fields share keys we explicitly want to clear on parent change) -----
  if (fname === 'company_code')      { sectionData.sales_org = ''; needRerender = true; }
  if (fname === 'customer_group')    { sectionData.customer_group1 = ''; sectionData.customer_group2 = ''; needRerender = true; }
  if (fname === 'customer_group1')   { sectionData.customer_group2 = ''; needRerender = true; }
  if (fname === 'bank_country')      { sectionData.bank_key = ''; needRerender = true; }
  if (fname === 'country')           { sectionData.terms_of_payment = ''; sectionData.payment_term = ''; sectionData.payment_terms = ''; needRerender = true; }
  if (fname === 'risk_class' || fname === 'rules') {
    // mirror between rules ↔ risk_class fields
    if (fname === 'risk_class') sectionData.rules = value;
    if (fname === 'rules') sectionData.risk_class = value;
  }

  // Refresh draft selector label whenever name/prefix changes
  if (fname === 'name_1' || fname === 'prefix_name') {
    renderDraftSelector();
  }

  liveValidate(sectionData);
  persistDrafts();
  if (needRerender) renderForm();
}

function liveValidate(sectionData) {
  // basic — count mandatory fields filled
  let total = 0, filled = 0;
  const fm = STATE.formData?.field_map?.[STATE.currentBpType] || {};
  for (const sec of Object.keys(fm)) {
    const sd = STATE.drafts[STATE.currentDraftIdx].sections[sec] || {};
    for (const [fn, meta] of Object.entries(fm[sec])) {
      if (meta.mandatory) {
        total++;
        if (sd[fn]) filled++;
      }
    }
  }
  $('#validationSummary').textContent = `Mandatory terisi: ${filled}/${total}`;
}

/* ============================================================
   DOCUMENT ATTACHMENTS — driven by DOCUMENT_REQUIREMENTS per BP Type
   ============================================================ */
function renderAttachmentSection(area, draft) {
  if (!draft.attachments) draft.attachments = [];

  const bpType = STATE.currentBpType;
  const docs = getDocRequirements(bpType);

  // Also pull any attachment fields from field_map.doc_completion that we haven't covered
  const fieldMap = STATE.formData.field_map?.[bpType]?.['doc_completion'] || {};
  const extraAttachments = Object.entries(fieldMap)
    .filter(([fn]) => fn.includes('attachment') || fn === 'faktur_competitor')
    .filter(([fn]) => !docs.some(d => d.key === fn))
    .map(([fn, m]) => ({key: fn, label: m.label || fn, mandatory: m.mandatory, bpTypes: ['*']}));

  const allDocs = [...docs, ...extraAttachments];
  const mandatoryDocs = allDocs.filter(d => d.mandatory);
  const optionalDocs = allDocs.filter(d => !d.mandatory);

  const h = document.createElement('h3');
  h.className = 'text-lg font-bold mb-2';
  h.textContent = `Document Attachments — ${bpType}`;
  area.appendChild(h);

  const desc = document.createElement('div');
  desc.className = 'text-xs text-slate-500 mb-4 space-y-1';
  desc.innerHTML = `
    <p>Upload dokumen pendukung (JPG/PNG/PDF, maks 5 MB). Dokumen <strong>TIDAK disimpan di server</strong> — akan dikirim sebagai lampiran email.</p>
    <p class="text-slate-400">BP Type: <strong>${esc(bpType)}</strong> — ${esc(STATE.formData.bp_types[bpType]?.description || '')} | Wajib: ${mandatoryDocs.length} dokumen | Opsional: ${optionalDocs.length} dokumen</p>
  `;
  area.appendChild(desc);

  // Mandatory documents section
  if (mandatoryDocs.length > 0) {
    const mHead = document.createElement('h4');
    mHead.className = 'text-sm font-bold text-red-700 mb-2 mt-4 flex items-center gap-2';
    mHead.innerHTML = '<span class="badge-m">M</span> Dokumen Wajib';
    area.appendChild(mHead);
    const mGrid = document.createElement('div');
    mGrid.className = 'grid grid-cols-1 md:grid-cols-2 gap-3 mb-4';
    mandatoryDocs.forEach(doc => mGrid.appendChild(renderDocCard(doc, draft)));
    area.appendChild(mGrid);
  }

  // Optional documents section
  if (optionalDocs.length > 0) {
    const oHead = document.createElement('h4');
    oHead.className = 'text-sm font-bold text-slate-500 mb-2 mt-4 flex items-center gap-2';
    oHead.innerHTML = '<span class="badge-o">O</span> Dokumen Opsional';
    area.appendChild(oHead);
    const oGrid = document.createElement('div');
    oGrid.className = 'grid grid-cols-1 md:grid-cols-2 gap-3';
    optionalDocs.forEach(doc => oGrid.appendChild(renderDocCard(doc, draft)));
    area.appendChild(oGrid);
  }

  // Completeness indicator
  const uploaded = draft.attachments.length;
  const mandUploaded = mandatoryDocs.filter(d => draft.attachments.some(a => a.slot === d.key)).length;
  const indicator = document.createElement('div');
  indicator.className = `mt-4 p-3 rounded-lg text-sm font-medium ${mandUploaded >= mandatoryDocs.length ? 'bg-emerald-50 text-emerald-700 border border-emerald-200' : 'bg-amber-50 text-amber-700 border border-amber-200'}`;
  indicator.textContent = `Dokumen wajib terisi: ${mandUploaded}/${mandatoryDocs.length} | Total upload: ${uploaded}/${allDocs.length}`;
  area.appendChild(indicator);
}

function renderDocCard(doc, draft) {
  const existing = draft.attachments.find(a => a.slot === doc.key);
  const card = document.createElement('div');
  card.className = `border rounded-lg p-3 ${existing ? 'bg-emerald-50 border-emerald-200' : doc.mandatory ? 'bg-red-50/30 border-red-200' : 'bg-slate-50 border-slate-200'}`;

  card.innerHTML = `
    <div class="flex items-center justify-between mb-2">
      <div class="flex items-center gap-2">
        <span class="text-sm font-medium">${esc(doc.label)}</span>
        ${doc.mandatory ? '<span class="badge-m">M</span>' : '<span class="badge-o">O</span>'}
      </div>
      ${existing ? '<span class="text-xs text-emerald-600 font-bold">✓ UPLOADED</span>' : ''}
    </div>
    <div class="text-[10px] text-slate-400 mb-2">BP Type: ${esc(doc.bpTypes.includes('*') ? 'Semua' : doc.bpTypes.join(', '))}</div>
    <div class="space-y-2">
      <input type="file" accept="image/*,.pdf" data-slot="${doc.key}" class="text-xs block w-full" />
      <input type="text" placeholder="Pemilik dokumen (nama / posisi)" data-owner="${doc.key}" value="${esc(existing?.owner || '')}" class="w-full border border-slate-300 rounded-md px-2 py-1 text-xs" />
      <input type="text" placeholder="Keterangan (opsional)" data-note="${doc.key}" value="${esc(existing?.note || '')}" class="w-full border border-slate-300 rounded-md px-2 py-1 text-xs" />
      ${existing ? `
        <div class="flex items-center justify-between text-xs bg-white rounded px-2 py-1">
          <span class="text-slate-600">📎 ${esc(existing.filename)} (${(existing.size/1024).toFixed(0)} KB)</span>
          <button data-remove="${doc.key}" class="text-red-600 hover:text-red-800 font-medium">✕ remove</button>
        </div>
      ` : ''}
    </div>
  `;

  // Bind events
  const fileInp = card.querySelector('input[type="file"]');
  fileInp.addEventListener('change', async e => {
    const f = e.target.files[0]; if (!f) return;
    if (f.size > 5 * 1024 * 1024) { alert('Maks 5 MB per file.'); return; }
    const b64 = await fileToB64(f);
    draft.attachments = draft.attachments.filter(a => a.slot !== doc.key);
    draft.attachments.push({
      slot: doc.key, label: doc.label, filename: f.name, mime: f.type, size: f.size, base64: b64,
      owner: card.querySelector(`input[data-owner="${doc.key}"]`)?.value || '',
      note:  card.querySelector(`input[data-note="${doc.key}"]`)?.value || '',
      mandatory: doc.mandatory
    });
    persistDrafts(); renderForm();
  });

  card.querySelectorAll('input[data-owner],input[data-note]').forEach(inp => {
    inp.addEventListener('input', e => {
      const slot = e.target.dataset.owner || e.target.dataset.note;
      const att = draft.attachments.find(a => a.slot === slot);
      if (att) {
        if (e.target.dataset.owner) att.owner = e.target.value;
        if (e.target.dataset.note) att.note = e.target.value;
        persistDrafts();
      }
    });
  });

  const rmBtn = card.querySelector('button[data-remove]');
  if (rmBtn) {
    rmBtn.addEventListener('click', () => {
      draft.attachments = draft.attachments.filter(a => a.slot !== doc.key);
      persistDrafts(); renderForm();
    });
  }

  return card;
}

function fileToB64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

/* ============================================================
   EXCEL TEMPLATE EXPORT (filled, matching uploaded template structure)
   ============================================================ */
function downloadFilledTemplate() {
  const fd = STATE.formData;
  const wb = XLSX.utils.book_new();

  // Build sheet_control sheet
  const sheetCtl = [['BP_TYPE', STATE.currentBpType], ['CR_TYPE', fd.bp_types[STATE.currentBpType]?.cr_type || ''], ['Generated', new Date().toISOString()]];
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheetCtl), 'sheet_control');

  // For each section in section_order, build a sheet from sections_schema + draft data
  fd.section_order.forEach(secKey => {
    const schema = fd.sections_schema?.[secKey];
    if (!schema) return;
    // Header row = column headers from schema
    const headers = schema.map(c => c.header);
    const aoa = [headers];
    // For each draft, build a row
    STATE.drafts.forEach((draft, di) => {
      const sd = draft.sections?.[secKey] || {};
      const gv = draft.sections?.general_view || {};
      const row = schema.map((col, ci) => {
        const fname = labelToFieldName(col.label);
        const fmeta = getFieldMeta(fname);

        // Metadata-driven export rules take precedence over template formulas
        // (so the upload contains actual values, not =FORMULA() the importer might not evaluate)
        if (fmeta.export_value === 'empty') {
          return '';
        }
        if (fmeta.export_value === 'composed') {
          if (fname === 'name_1') return composeName(gv) || (sd[fname] ?? '');
          if (fname === 'address') return composeAddress(gv);
          if (fmeta.compose_from) {
            return fmeta.compose_from.map(f => gv[f] || sd[f] || '').filter(Boolean).join(' ');
          }
        }

        // Otherwise: keep template formula if any
        if (col.default?.type === 'formula') {
          const f = col.default.value.replace(/(\$?[A-Z]+\$?)2(?![0-9])/g, (m, p1) => `${p1}${di+2}`);
          return { f: f.startsWith('=') ? f.substring(1) : f };
        }

        // Default: pull from current section, fallback to general_view
        let val = sd[fname];
        if (val == null || val === '') val = gv[fname];
        if (val == null) {
          if (col.default?.type === 'value') return col.default.value;
          return '';
        }
        return val;
      });
      aoa.push(row);
    });
    const ws = XLSX.utils.aoa_to_sheet(aoa);
    XLSX.utils.book_append_sheet(wb, ws, secKey);
  });

  // Append Dropdown_LOV reference sheet
  const lov = fd.dropdown_lov || {};
  const lovAoa = [['LOV_Name','ID','Description']];
  Object.entries(lov).forEach(([k, arr]) => {
    if (Array.isArray(arr)) arr.forEach(it => {
      lovAoa.push([k, it.id ?? it, it.desc ?? '']);
    });
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(lovAoa), 'Dropdown_LOV');

  // Append _dv_data
  const dv = fd.dv_data || {};
  const dvAoa = [['Category','Value']];
  Object.entries(dv).forEach(([k, arr]) => {
    if (Array.isArray(arr)) arr.forEach(v => dvAoa.push([k, v]));
  });
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(dvAoa), '_dv_data');

  const dt = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `Template_CR_Creation_${STATE.currentBpType}_filled_${dt}.xlsx`);
}

/* ============================================================
   EMAIL SUBMIT — comprehensive body with document info
   No database storage. Documents attached via email only.
   ============================================================ */
function submitViaEmail() {
  const fd = STATE.formData;
  const bpType = STATE.currentBpType;
  const bpDesc = fd.bp_types[bpType]?.description || '';
  const crType = fd.bp_types[bpType]?.cr_type || '';
  const requestor = STATE.settings.requestor || '(belum diisi)';
  const entity = (bpType.startsWith('ZA') || bpType.startsWith('ZB') || bpType.startsWith('ZJ')) ? 'Vendor' : 'Customer';

  // Validate mandatory documents
  const reqDocs = getDocRequirements(bpType);
  const mandDocs = reqDocs.filter(d => d.mandatory);
  const missingDocs = [];
  STATE.drafts.forEach((d, i) => {
    const gv = d.sections?.general_view || {};
    const name = composeName(gv) || `Draft ${i+1}`;
    mandDocs.forEach(doc => {
      if (!(d.attachments || []).some(a => a.slot === doc.key)) {
        missingDocs.push(`${name}: ${doc.label}`);
      }
    });
  });
  if (missingDocs.length > 0) {
    const proceed = confirm(
      `⚠️ Dokumen wajib belum lengkap:\n\n${missingDocs.join('\n')}\n\nLanjutkan submit tanpa dokumen tersebut?`
    );
    if (!proceed) return;
  }

  const subject = `${EMAIL_CONFIG.subjectPrefix} — ${bpType} (${entity}) — ${STATE.drafts.length} record(s) — ${requestor}`;

  let body = `Dear BP Creation Team,\n\n`;
  body += `Berikut request pembuatan Business Partner.\n\n`;
  body += `══════════════════════════════════════\n`;
  body += `  INFORMASI REQUEST\n`;
  body += `══════════════════════════════════════\n`;
  body += `BP Type      : ${bpType} — ${bpDesc}\n`;
  body += `Entity       : ${entity}\n`;
  body += `CR Type      : ${crType}\n`;
  body += `Requestor    : ${requestor}\n`;
  body += `Tanggal      : ${new Date().toLocaleString('id-ID')}\n`;
  body += `Jumlah Record: ${STATE.drafts.length}\n\n`;

  // Per-draft detail
  STATE.drafts.forEach((d, i) => {
    const gv = d.sections?.general_view || {};
    const name = composeName(gv) || '(tanpa nama)';
    body += `══════════════════════════════════════\n`;
    body += `  RECORD ${i+1}: ${name}\n`;
    body += `══════════════════════════════════════\n`;
    body += `Nama         : ${name}\n`;
    body += `NPWP         : ${d.sections?.tax_doc_completion?.npwp_number || '-'}\n`;
    body += `KTP          : ${d.sections?.tax_doc_completion?.ktp_number || '-'}\n`;
    body += `Alamat       : ${composeAddress(gv) || '-'}\n`;
    body += `Kelurahan    : ${gv.sub_district || '-'}\n`;
    body += `Kecamatan    : ${gv.district || '-'}\n`;
    body += `Kab/Kota     : ${gv.regency || gv.city || '-'}\n`;
    body += `Provinsi     : ${gv.province || '-'}\n`;
    body += `Kode Pos     : ${gv.postal_code || '-'}\n`;
    body += `Email        : ${gv.email || '-'}\n`;
    body += `Phone        : ${gv.phone || '-'}\n`;

    // Company & finance
    const cfv = d.sections?.cust_finance_view || {};
    if (cfv.company_code) body += `Company Code : ${cfv.company_code}\n`;
    if (cfv.sales_org) body += `Sales Org    : ${cfv.sales_org}\n`;

    // Document listing
    const docCount = (d.attachments || []).length;
    body += `\n--- DOKUMEN TERLAMPIR (${docCount}) ---\n`;
    if (docCount > 0) {
      (d.attachments || []).forEach((a, ai) => {
        const docMeta = STATE.formData.document_meta?.[a.slot] || {};
        body += `  ${ai+1}. ${a.label || docMeta.label || a.slot}\n`;
        body += `     File     : ${a.filename} (${(a.size/1024).toFixed(0)} KB)\n`;
        body += `     Pemilik  : ${a.owner || '-'}\n`;
        body += `     Ket.     : ${a.note || '-'}\n`;
        body += `     Download : vendor${i+1}_${a.slot}_${a.filename}\n`;
      });
    } else {
      body += `  (tidak ada dokumen di-upload)\n`;
    }

    // Missing mandatory docs warning
    const thisMissing = mandDocs.filter(doc => !(d.attachments || []).some(a => a.slot === doc.key));
    if (thisMissing.length > 0) {
      body += `\n  ⚠️ DOKUMEN WAJIB BELUM UPLOAD:\n`;
      thisMissing.forEach(doc => {
        body += `    - ${doc.label}\n`;
      });
    }
    body += `\n`;
  });

  body += `══════════════════════════════════════\n`;
  body += `  CATATAN\n`;
  body += `══════════════════════════════════════\n`;
  body += `• File Excel template (terisi, siap upload) sudah di-download otomatis.\n`;
  body += `  Nama file: Template_CR_Creation_${bpType}_filled_${new Date().toISOString().slice(0,10)}.xlsx\n`;
  body += `• File dokumen pendukung sudah di-download terpisah.\n`;
  body += `  Mohon attach SEMUA file dari folder Downloads ke email ini.\n`;
  body += `• Dokumen TIDAK disimpan di database — hanya dikirim via email.\n\n`;
  body += `Terima kasih,\n${requestor}\n`;

  // Trigger excel download first
  downloadFilledTemplate();

  // Collect all attachment files for download
  const allAttachments = [];
  STATE.drafts.forEach((d, di) => {
    (d.attachments || []).forEach(a => {
      allAttachments.push({
        ...a,
        downloadName: `vendor${di+1}_${a.slot}_${a.filename}`
      });
    });
  });

  // Send email via configured method
  sendEmail(subject, body, allAttachments);
}

function exportDraftsJson() {

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `bp_drafts_${STATE.currentBpType}_${new Date().toISOString().slice(0,10)}.json`;

}
async function importDraftsJson(e) {
  const f = e.target.files[0]; if (!f) return;
  try {
    const data = JSON.parse(await f.text());
    if (data.bpType) {
      STATE.currentBpType = data.bpType;
      $('#pickBpType').value = data.bpType;
    }
    STATE.drafts = data.drafts || [createEmptyDraft()];
    STATE.currentDraftIdx = 0;
    enterFormStep();
  } catch (err) { alert('Gagal load: ' + err.message); }
}

function removeYeniTyping() { document.getElementById('yeniTyping')?.remove(); }

async function sendYeniMessage() {
  const inp = $('#yeniInput');
  const text = inp.value.trim();
  if (!text) return;
  inp.value = '';
  addYeniMessage('user', text);

  if (!STATE.settings.workerUrl) {
    addYeniMessage('assistant', '⚠️ Worker URL belum diset. Buka ⚙️ Settings dan masukkan URL Cloudflare Worker dulu.');
    return;
  }
  addYeniTyping();
  try {
    const sys = buildYeniSystemPrompt();
    const res = await fetch(STATE.settings.workerUrl, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ system: sys, messages: YENI_HISTORY.filter(m => m.role !== 'system').slice(-10) })
    });
    const data = await res.json();
    removeYeniTyping();
    addYeniMessage('assistant', data.response || data.error || '(no response)');
  } catch (err) {
    removeYeniTyping();
    addYeniMessage('assistant', 'Error: ' + err.message);
  }
}

function buildYeniSystemPrompt() {
  const fd = STATE.formData;
  const bp = STATE.currentBpType;
  const draft = STATE.drafts[STATE.currentDraftIdx];
  const fmKeys = Object.keys(fd?.field_map?.[bp] || {});

  // Build field knowledge: list all visible fields with label, mandatory, widget type, format hint
  let fieldKnowledge = '';
  const fm = fd?.field_map?.[bp] || {};
  for (const sec of Object.keys(fm)) {
    const secLabel = fd.section_display?.[sec] || sec;
    const fields = fm[sec];
    const flines = Object.entries(fields).map(([fn, meta]) => {
      const fmeta = fd.field_metadata?.[fn] || {};
      const mFlag = meta.mandatory ? 'WAJIB' : 'opsional';
      const hint = fmeta.format_hint || '';
      const widget = fmeta.widget || 'text';
      const deriveInfo = fmeta.derive_from ? ` [auto-derive dari: ${fmeta.derive_from.join(', ')}]` : '';
      return `  - ${meta.label} (${fn}): ${mFlag}, tipe=${widget}${hint ? ', format: '+hint : ''}${deriveInfo}`;
    });
    if (flines.length) fieldKnowledge += `\n[${secLabel}]\n${flines.join('\n')}`;
  }

  // Build document knowledge for current BP type
  const docs = getDocRequirements(bp);
  const docMandatory = docs.filter(d => d.mandatory).map(d => d.label);
  const docOptional = docs.filter(d => !d.mandatory).map(d => d.label);
  const docKnowledge = `Dokumen WAJIB: ${docMandatory.join(', ') || '(tidak ada)'}
Dokumen Opsional: ${docOptional.join(', ') || '(tidak ada)'}`;

  // Build dropdown summary (top values for key fields)
  let dropdownKnowledge = '';
  const keyDropdowns = ['company_code','sales_org','risk_class','country','bank_country','terms_of_payment','recon_account','tax_classification','customer_group'];
  for (const fn of keyDropdowns) {
    const lov = fd.dropdown_lov?.[fd.field_metadata?.[fn]?.lov] || fd.dropdown_lov?.[fd.field_options?.[fn]] || [];
    if (lov.length > 0) {
      const items = lov.slice(0, 8).map(x => `${x.id}=${x.desc||x.id}`).join(', ');
      dropdownKnowledge += `  ${fn}: ${items}${lov.length > 8 ? ` ... (${lov.length} total)` : ''}\n`;
    }
  }

  // Current draft data snapshot
  const draftSnap = JSON.stringify(draft?.sections || {}).substring(0, 1200);

  return `Kamu adalah Yeni, asisten AI yang ramah dan profesional untuk form BP Creation Wings Group.
Jawab dalam Bahasa Indonesia, singkat (maks 5 kalimat), dan langsung ke poin.

═══ KONTEKS SAAT INI ═══
BP Type: ${bp} (${fd?.bp_types?.[bp]?.description || ''})
Entity: ${bp?.startsWith('ZA') || bp?.startsWith('ZB') || bp?.startsWith('ZJ') ? 'Vendor' : 'Customer'}
Section tersedia: ${fmKeys.join(', ')}

═══ DAFTAR FIELD & STATUS ═══${fieldKnowledge}

═══ DOKUMEN REQUIREMENTS (${bp}) ═══
${docKnowledge}

═══ DROPDOWN VALUES (ringkasan) ═══
${dropdownKnowledge}
═══ ATURAN DERIVASI OTOMATIS ═══
1. Company Code → filter Sales Org (dari CompanySorg)
2. Sales Org → Distribution Channel, Division, Sales Office, Plant (dari Mapping Area)
3. Risk Class → Check Rule (otomatis)
4. Bank Country → filter Bank Key (dari Master Bank Info)
5. Country + BP Type → filter Term of Payment
6. BP Type + Country → filter Recon Account
7. Province → Regency → District → Sub-District → Postal Code + Region (cascade geo)
8. Customer Group (CG) → CG1 (Type) → CG2 (Size) cascade
9. Prefix Name + Name 1 → auto-join ke kolom Name 1 di template
10. Prefix Address + Street + Blok + No + RT/RW → auto-join ke Address (Full)

Field yang TERKUNCI (read-only) berarti auto-derived. User harus isi field INDUK dulu.
Contoh: Kecamatan terkunci → user harus pilih Province, lalu Regency, baru District muncul.
Contoh: Sales Org terkunci → user harus pilih Company Code dulu.

═══ DRAFT SAAT INI ═══
${draftSnap}

═══ TUGAS KAMU ═══
1. Jelaskan fungsi setiap field jika ditanya (NPWP, NITKU, Recon Account, Risk Class, dll)
2. Beri tau format benar (NPWP 15-16 digit, KTP 16 digit, phone +62, dll)
3. Jelaskan kenapa field auto-isi atau terkunci (cek aturan derivasi)
4. Beri tau dokumen wajib/opsional per BP Type
5. Validasi semantic data draft jika diminta
6. Jelaskan arti value dropdown jika ditanya
Jangan jawab hal di luar konteks form BP.`;
}

async function validateWithYeni() {
  if (!STATE.settings.workerUrl) {
    alert('Set Cloudflare Worker URL di Settings dulu.');
    return;
  }
  openYeni();
  addYeniMessage('user', 'Tolong validasi semua field di draft saya saat ini.');
  addYeniTyping();
  try {
    const sys = buildYeniSystemPrompt();
    const draft = STATE.drafts[STATE.currentDraftIdx];
    const userMsg = `Validasi data berikut. Sebutkan masalah seperti format salah, prefix tidak konsisten, alamat aneh, NPWP salah, dll. Berikan rekomendasi perbaikan yang jelas.\n\n${JSON.stringify(draft.sections, null, 2)}`;
    const res = await fetch(STATE.settings.workerUrl, {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ system: sys, messages: [{role:'user', content: userMsg}] })
    });
    const data = await res.json();
    removeYeniTyping();
    addYeniMessage('assistant', data.response || data.error || '(no response)');
  } catch (err) {
    removeYeniTyping();
    addYeniMessage('assistant', 'Error: ' + err.message);
  }
}
